<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MillionairesGroup - Customer Wallet Portal</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --line:#d8e0ea;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#0b5cab;
      --primary-dark:#084d90;
      --success:#15803d;
      --danger:#dc2626;
      --warning:#b45309;
      --sidebar:#083b66;
      --sidebar-2:#0a4b7d;
      --radius:14px;
      --shadow:0 10px 24px rgba(15, 23, 42, 0.08);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns:250px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));
      color:#fff;
      padding:22px 14px;
    }

    .brand{
      font-size:24px;
      font-weight:700;
      line-height:1.2;
      padding:8px 10px 18px;
      border-bottom:1px solid rgba(255,255,255,.12);
      margin-bottom:18px;
    }

    .brand small{
      display:block;
      margin-top:6px;
      font-size:12px;
      font-weight:400;
      opacity:.8;
    }

    .navItem{
      display:block;
      width:100%;
      text-align:left;
      background:transparent;
      border:0;
      color:#fff;
      padding:12px 14px;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
      margin-bottom:8px;
    }

    .navItem.active,
    .navItem:hover{
      background:rgba(255,255,255,.12);
    }

    .main{
      padding:22px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .tableHeader{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px;
      border-bottom:1px solid var(--line);
      flex-wrap:wrap;
    }

    .tableTitle{
      font-size:24px;
      font-weight:700;
    }

    .tableSub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .tableActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    input, select{
      width:100%;
      height:42px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 12px;
      outline:none;
      background:#fff;
      color:var(--text);
    }

    input:focus, select:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(11,92,171,.10);
    }

    .btn{
      height:42px;
      border:0;
      border-radius:10px;
      padding:0 14px;
      cursor:pointer;
      font-weight:600;
      background:var(--primary);
      color:#fff;
    }

    .btn:hover{ background:var(--primary-dark); }
    .btn.ghost{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }
    .btn.success{ background:var(--success); }
    .btn.danger{ background:var(--danger); }
    .btn.warning{ background:var(--warning); }

    .contentPad{
      padding:18px;
    }

    .formGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(260px, 1fr));
      gap:16px;
    }

    .formSection{
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
      background:#fff;
    }

    .formSection h3{
      margin:0 0 14px;
      font-size:16px;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
      font-weight:600;
    }

    .actionRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
    }

    .mutedSmall{
      font-size:12px;
      color:var(--muted);
    }

    .statusMsg{
      margin-top:8px;
      min-height:18px;
      font-size:13px;
      font-weight:600;
    }

    .tableWrap{
      width:100%;
      overflow:auto;
      border-top:1px solid var(--line);
    }

    .table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }

    .table th,
    .table td{
      padding:14px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:middle;
      font-size:14px;
    }

    .table th{
      background:#f8fafc;
      color:#475569;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .center{text-align:center}

    .pill{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      text-transform:capitalize;
    }

    .pill.active{ background:#dcfce7; color:#166534; }
    .pill.inactive{ background:#f3f4f6; color:#4b5563; }
    .pill.suspended{ background:#fee2e2; color:#991b1b; }

    .footerBar{
      padding:12px 18px;
    }

    @media (max-width: 1180px){
      .formGrid{ grid-template-columns:1fr; }
    }

    @media (max-width: 900px){
      .app{ grid-template-columns:1fr; }
      .sidebar{ display:none; }
    }
  </style>
  <script src="./millionairesgroup.js" defer></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        MillionairesGroup
        <small>Customer Wallet Portal</small>
      </div>

      <button class="navItem active" type="button">Customers</button>
      <button class="navItem" type="button">Wallets</button>
      <button class="navItem" type="button">Transactions</button>
      <button class="navItem" type="button">API Logs</button>
      <button class="navItem" type="button">Settings</button>
    </aside>

    <main class="main">
      <section class="card">
        <div class="tableHeader">
          <div>
            <div class="tableTitle">MillionairesGroup</div>
            <div class="tableSub">Customer profile and wallet management</div>
          </div>

          <div class="tableActions">
            <input id="search" type="text" placeholder="Search name / username / phone / website">
            <button class="btn ghost" id="btnRefresh" type="button">Refresh</button>
          </div>
        </div>

        <div class="contentPad">
          <form id="customerForm" class="formGrid">
            <input type="hidden" id="editId">

            <div class="formSection">
              <h3>Customer Profile</h3>

              <div class="field">
                <label for="customerCode">Customer Code</label>
                <input id="customerCode" type="text" placeholder="CUST-0001">
              </div>

              <div class="field">
                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" required>
              </div>

              <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" required>
              </div>

              <div class="field">
                <label for="phone">Phone Number</label>
                <input id="phone" type="tel" required>
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email">
              </div>

              <div class="field">
                <label for="website">Website</label>
                <input id="website" type="text">
              </div>

              <div class="field">
                <label for="groupName">Group</label>
                <input id="groupName" type="text">
              </div>

              <div class="field">
                <label for="status">Status</label>
                <select id="status">
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                  <option value="suspended">Suspended</option>
                </select>
              </div>
            </div>

            <div class="formSection">
              <h3>Wallet Details</h3>

              <div class="field">
                <label for="currency">Currency</label>
                <select id="currency">
                  <option value="USD">USD</option>
                  <option value="AUD">AUD</option>
                  <option value="PHP">PHP</option>
                </select>
              </div>

              <div class="field">
                <label for="mainBalance">Main Balance</label>
                <input id="mainBalance" type="number" step="0.01" value="0.00">
              </div>

              <div class="field">
                <label for="bonusBalance">Bonus Balance</label>
                <input id="bonusBalance" type="number" step="0.01" value="0.00">
              </div>

              <div class="field">
                <label for="lockedBalance">Locked Balance</label>
                <input id="lockedBalance" type="number" step="0.01" value="0.00">
              </div>
            </div>

            <div class="formSection">
              <h3>Wallet Actions</h3>

              <div class="field">
                <label for="actionAmount">Amount</label>
                <input id="actionAmount" type="number" step="0.01" placeholder="0.00">
              </div>

              <div class="field">
                <label for="actionRemarks">Remarks</label>
                <input id="actionRemarks" type="text" placeholder="Enter remarks">
              </div>

              <div class="actionRow">
                <button class="btn" id="btnSave" type="submit">Save Customer</button>
                <button class="btn success" id="btnCredit" type="button">Credit Wallet</button>
                <button class="btn danger" id="btnDebit" type="button">Debit Wallet</button>
                <button class="btn ghost" id="btnCancelEdit" type="button" hidden>Cancel</button>
              </div>

              <div id="statusMsg" class="statusMsg"></div>
            </div>
          </form>
        </div>

        <div class="tableWrap">
          <table class="table">
            <thead>
              <tr>
                <th>Customer Code</th>
                <th>Full Name</th>
                <th>Username</th>
                <th>Phone</th>
                <th>Website</th>
                <th>Group</th>
                <th>Status</th>
                <th>Main Balance</th>
                <th>Bonus Balance</th>
                <th>Locked Balance</th>
                <th class="center">Actions</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="footerBar">
          <div class="mutedSmall" id="countLabel">0 record(s)</div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
